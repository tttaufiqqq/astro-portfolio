name: Auto-merge to main

on:
  push:
    branches: [improve/roadmap]

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend tests
        run: |
          npm ci
          npm test

      - name: Backend tests
        run: |
          cd server
          npm install
          npm test

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -f main
          git merge origin/improve/roadmap --no-ff -m "Auto-merge: improve/roadmap → main"
          git push origin main
