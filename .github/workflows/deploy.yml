name: Deploy to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist
          mkdir -p deploy/server/dist
          cp -r dist/. deploy/dist/
          cp -r server/dist/. deploy/server/dist/
          cp -r server/node_modules deploy/node_modules
          cp -r server/prisma deploy/prisma
          cp server/package.json deploy/package.json
          cd deploy && zip -r ../release.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: tttaufiqq-portfolio
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
          package: release.zip
